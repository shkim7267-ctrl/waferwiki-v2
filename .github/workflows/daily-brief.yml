name: Daily Semiconductor Brief

on:
  schedule:
    # Retry window: 09:00~14:00 KST (UTC+9)
    - cron: '0 0-5 * * *'
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Retry attempt count'
        required: false
        default: '0'

permissions:
  contents: write
  actions: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily brief (retry loop)
        timeout-minutes: 40
        run: |
          set -e
          MAX_TRIES=4
          for i in $(seq 1 $MAX_TRIES); do
            echo "Attempt $i/$MAX_TRIES"
            if node scripts/generate-daily-brief.js; then
              exit 0
            fi
            if [ "$i" -lt "$MAX_TRIES" ]; then
              echo "Retrying in 8 minutes..."
              sleep 480
            fi
          done
          exit 1
        env:
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          UPSTAGE_MODEL: solar-pro
          BRIEF_TIMEZONE: Asia/Seoul
          BRIEF_SOURCE_MODE: curated
          BRIEF_MIN_GOOD: 8
          BRIEF_MIN_CHARS: 800
          BRIEF_MIN_BULLET_CHARS: 20
          BRIEF_MIN_KEY_TAKEAWAY_CHARS: 40
          BRIEF_MIN_IMPACT_CHARS: 30
          BRIEF_MAX_ATTEMPTS: 60
          BRIEF_OVERWRITE: false

      - name: Commit changes
        run: |
          if [[ -z "$(git status --porcelain content/invest/briefs)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "waferwiki-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/invest/briefs
          git commit -m "chore: daily brief $(date -u +%F)"
          git push

      - name: Retry on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETRY_COUNT: ${{ github.event.inputs.retry_count }}
        run: |
          MAX_RETRIES=3
          COUNT=${RETRY_COUNT:-0}
          if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
            echo "Max retries reached ($COUNT/$MAX_RETRIES)."
            exit 0
          fi
          NEXT=$((COUNT + 1))
          echo "Dispatching retry attempt $NEXT..."
          PAYLOAD=$(printf '{"ref":"main","inputs":{"retry_count":"%s"}}' "$NEXT")
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/daily-brief.yml/dispatches \
            -d "$PAYLOAD"
